name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  # Aperçu avant merge : une PR ouverte/mise à jour publie son build sur le site
  # GitHub Pages (unique). La PR « remplace la page actuelle » ; à la fusion, main
  # redéploie le même contenu. Pas de sous-dossier, pas d'URL d'aperçu séparée.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      # prebuild copie le dictionnaire kuromoji dans app/public/dict avant le build Vite.
      # VITE_WORKER_URL (variable de repo) pointe l'app vers le Worker de génération.
      - run: npm run build
        env:
          VITE_WORKER_URL: ${{ vars.VITE_WORKER_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
