# Diagnostic TEMPORAIRE : sonde le POST /tts du Worker déployé (mode multi-voix SSML
# <voice>) depuis un runner GitHub — l'environnement de dev n'a pas d'egress vers
# workers.dev. Mesure le volume réel des MP3 (ffmpeg volumedetect) pour départager
# « audio silencieux renvoyé par Google » d'un problème de lecture côté client.
# À SUPPRIMER une fois le diagnostic terminé.
name: tts-probe

on:
  push:
    branches: [claude/tts-offline-reading-strategy-zmjhla]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Sonde /tts (FR seul, JA seul, multi-voix, segments)
        run: |
          set -euo pipefail
          W="https://learn-japan-gen.learn-japan-gen.workers.dev/tts"
          probe() {
            local name="$1" body="$2"
            echo "=== $name ==="
            http=$(curl -sS -o "resp-$name.json" -w "%{http_code}" -X POST "$W" -H 'Content-Type: application/json' -d "$body")
            echo "HTTP $http ; taille réponse: $(wc -c < "resp-$name.json") octets"
            if [ "$http" != "200" ]; then cat "resp-$name.json"; echo; return 0; fi
            python3 -c "import json,base64; d=json.load(open('resp-$name.json')); open('$name.mp3','wb').write(base64.b64decode(d['audio'])); print('marks:', d.get('marks'))"
            echo "mp3: $(wc -c < "$name.mp3") octets"
            ffmpeg -hide_banner -i "$name.mp3" -af volumedetect -f null - 2>&1 | grep -E "Duration|mean_volume|max_volume" || true
          }
          probe fr-seul '{"parts":[{"text":"Bonjour, ceci est un essai de synthèse vocale.","voice":"fr-FR-Neural2-A","languageCode":"fr-FR"}]}'
          probe ja-seul '{"parts":[{"text":"日本語を勉強しています。","voice":"ja-JP-Neural2-B","languageCode":"ja-JP"}]}'
          probe multi-voix '{"parts":[{"text":"La particule ","voice":"fr-FR-Neural2-A","languageCode":"fr-FR"},{"text":"は","voice":"ja-JP-Neural2-B","languageCode":"ja-JP"},{"text":" marque le thème du sujet.","voice":"fr-FR-Neural2-A","languageCode":"fr-FR"}]}'
          probe segments '{"segments":["猫","が","い","る","。"]}'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tts-probe
          path: |
            *.mp3
            resp-*.json
