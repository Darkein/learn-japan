name = "learn-japan-gen"
main = "src/index.ts"
compatibility_date = "2024-11-27"

# Workers.dev activé → URL publique https://learn-japan-gen.<sous-domaine>.workers.dev
workers_dev = true

[vars]
# Modèle texte gratuit (free tier Gemini). La clé est un SECRET, pas une var :
#   wrangler secret put GEMINI_API_KEY
GEMINI_MODEL = "gemini-2.5-flash"
REQUIRE_ACCESS = "false"   # passer à "true" une fois Cloudflare Access configuré devant le Worker

# Génération SYNCHRONE : pas de KV ni de R2 à provisionner (revient en Phase 3 pour le TTS/R2).
# Protection : placer Cloudflare Access (login email gratuit) DEVANT ce Worker si besoin.
# Aucune clé n'est exposée au client : seul le Worker détient GEMINI_API_KEY.
