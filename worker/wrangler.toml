name = "learn-japan-gen"
main = "src/index.ts"
compatibility_date = "2024-11-27"

# Compte Cloudflare (non secret) → wrangler n'a plus besoin d'interroger /memberships
# (ce que le token restreint ne peut pas faire).
account_id = "8329b0294a47ab8cf1b2556fd98c79b8"

# Workers.dev activé → URL publique https://learn-japan-gen.<sous-domaine>.workers.dev
workers_dev = true

[vars]
# Modèle texte gratuit (free tier Gemini). La clé est un SECRET, pas une var :
#   wrangler secret put GEMINI_API_KEY
# Clés additionnelles (autres projets Google AI) pour répartir le quota et servir
# de repli sur 429 : wrangler secret put GEMINI_API_KEY_2  (puis _3, … jusqu'à _10).
# Le Worker, pour chaque modèle, essaie toutes les clés avant de dégrader de modèle.
GEMINI_MODEL = "gemini-2.5-flash"
REQUIRE_ACCESS = "false"   # passer à "true" une fois Cloudflare Access configuré devant le Worker

# TTS (écoute d'article / mode voiture). Voix et débit par défaut, surchargeables par
# requête. La CLÉ est un SECRET :  wrangler secret put GOOGLE_TTS_API_KEY
# Prérequis GCP : activer « Cloud Text-to-Speech API » puis créer une clé API restreinte
# à cette API. Sans clé, POST /tts répond 503 → le client lit via la Web Speech API.
TTS_VOICE = "ja-JP-Neural2-B"
TTS_RATE = "1.0"

# Chaîne de repli, du plus puissant au plus léger : sur quota (429) ou échec d'un
# modèle, le Worker bascule sur le suivant. Optionnel — sans cette var, un défaut
# codé en dur est utilisé (2.5-pro → GEMINI_MODEL → 3.5-flash → 3-flash →
# 2.5-flash → 2.0-flash → 3.1-flash-lite → 2.5-flash-lite).
# MODEL_CHAIN = '[{"provider":"gemini","model":"gemini-2.5-pro","keyEnv":"GEMINI_API_KEY"},{"provider":"gemini","model":"gemini-2.5-flash","keyEnv":"GEMINI_API_KEY"},{"provider":"gemini","model":"gemini-2.0-flash","keyEnv":"GEMINI_API_KEY"}]'

# Génération SYNCHRONE. Protection : placer Cloudflare Access (login email gratuit)
# DEVANT ce Worker si besoin. Aucune clé n'est exposée au client : seul le Worker
# détient GEMINI_API_KEY / GOOGLE_TTS_API_KEY.

# Cache R2 de TOUT le contenu généré → on ne rappelle Gemini / Cloud TTS que si le
# résultat n'est pas déjà en cache (économie de quota / « tokens »). La pré-génération
# en lot (`npm run content:batch`) remplit ces buckets d'avance. Bindings OPTIONNELS :
# retirer un binding = revenir à la génération à la volée sans cache (cf. cache.ts).
[[r2_buckets]]
binding = "GEN_CACHE"        # textes Gemini (leçons, histoires, traductions, QCM)
bucket_name = "learn-japan-content"

[[r2_buckets]]
binding = "TTS_CACHE"        # audio Cloud Text-to-Speech (lecteur / podcast)
bucket_name = "learn-japan-audio"

[secrets]
required = [ "GEMINI_API_KEY", "GEMINI_API_KEY_2" ]